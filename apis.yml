apis:
  - aid: cheerio:cheerio
    name: Cheerio
    description: >-
      Cheerio implements a subset of core jQuery designed for the server.
      It parses markup into a traversable, manipulable DOM-like data
      structure and exposes a familiar jQuery-style API for selecting
      elements, traversing the tree, modifying attributes, extracting
      text, and rendering HTML. It is commonly used in scraping
      pipelines, build tools, static site generators, and tests that need
      to operate over HTML content without launching a browser.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
