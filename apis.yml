aid: cheerio
name: Cheerio
kind: opensource
description: >-
  Cheerio is a fast, flexible, and elegant Node.js library for parsing and
  manipulating HTML and XML using a jQuery-compatible API. It is widely used
  for server-side web scraping, HTML transformation, data extraction, and
  static site generation. Cheerio is MIT licensed and distributed as the
  cheerio npm package, maintained under the cheeriojs GitHub organization.
